name: Build APK

# Fabrique l'APK a chaque push sur main/master,
# ou manuellement depuis l'onglet "Actions" (Run workflow).
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Installer les dependances
        run: npm install

      - name: Compiler l'appli web (Vite)
        run: npm run build

      - name: Ajouter la plateforme Android
        run: npx cap add android

      - name: Ajouter la permission micro (RECORD_AUDIO)
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q "RECORD_AUDIO" "$MANIFEST"; then
            sed -i 's#<application#<uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <application#' "$MANIFEST"
          fi

      - name: Generer l'icone et le splash (smiley punk)
        run: npx capacitor-assets generate --android

      - name: Synchroniser Capacitor
        run: npx cap sync android

      - name: Accepter les licences du SDK Android
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Construire l'APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: broyeur-idees-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
